<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yet to Come - PToB</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            line-height: 1.6;
            color: #2d3436;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 50%, #f5f5f5 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px 0;
        }

        .nav-container {
            max-width: 1700px;
            margin: 0 auto;
            padding: 0 20px 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 80px;
            width: auto;
            background: #ffffff;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 25px;
            list-style: none;
        }

        .nav-menu a {
            color: #2d3436;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #FFD54F;
            transition: width 0.3s ease;
        }

        .nav-menu a:hover {
            color: #FFD54F;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .nav-menu li {
            position: relative;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #ffffff;
            min-width: 240px;
            box-shadow: 0px 2px 8px 0px rgba(0,0,0,0.1);
            z-index: 1000;
            margin-top: 0;
            border-radius: 0;
            padding: 20px 0;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0s linear 0.2s;
        }

        .dropdown-content::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            right: 0;
            height: 15px;
        }

        .dropdown-content a {
            color: #999999;
            padding: 14px 30px;
            text-decoration: none;
            display: block;
            font-size: 0.95em;
            font-weight: 400;
            text-transform: none;
            transition: color 0.2s ease;
            letter-spacing: 0;
        }

        .dropdown-content a::after {
            display: none;
        }

        .dropdown-content a:hover {
            color: #2d3436;
            background-color: transparent;
        }

        .dropdown:hover .dropdown-content {
            display: block;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.2s ease;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .search-icon {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .search-icon:hover {
            transform: scale(1.1);
        }

        /* Coming Soon Section */
        .coming-soon {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 120px);
            padding: 60px 40px;
            position: relative;
        }

        .coming-soon-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            align-items: center;
            position: relative;
        }

        .coming-soon-content {
            text-align: left;
            animation: fadeInLeft 1s ease;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .coming-soon-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            font-weight: 900;
            color: #2d3436;
            margin-bottom: 30px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .coming-soon-content .yet {
            color: #FFD54F;
            display: block;
            font-size: 0.6em;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .coming-soon-content p {
            font-size: 1.5em;
            color: #5a5a5a;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .coming-soon-content .highlight {
            color: #2d3436;
            font-weight: 700;
        }

        .notify-form {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .notify-form input {
            padding: 15px 20px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            flex: 1;
            font-family: 'Lato', sans-serif;
            transition: border-color 0.3s ease;
        }

        .notify-form input:focus {
            outline: none;
            border-color: #FFD54F;
        }

        .notify-form button {
            padding: 15px 40px;
            font-size: 1em;
            font-weight: 700;
            background: #2d3436;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .notify-form button:hover {
            background: #FFD54F;
            color: #2d3436;
            transform: translateY(-2px);
        }

        .coming-soon-image {
            position: relative;
            animation: fadeInRight 1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .coming-soon-image img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Decorative elements */
        .coming-soon::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,213,79,0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 4s ease-in-out infinite;
        }

        .coming-soon::after {
            content: '';
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45,52,54,0.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .coming-soon-container {
                grid-template-columns: 1fr;
                gap: 60px;
                text-align: center;
            }

            .coming-soon-content {
                text-align: center;
            }

            .coming-soon-content h1 {
                font-size: 3em;
            }

            .notify-form {
                flex-direction: column;
            }

            .coming-soon-image img {
                max-width: 400px;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .logo img {
                height: 60px;
            }

            .coming-soon-content h1 {
                font-size: 2.5em;
            }

            .coming-soon-content p {
                font-size: 1.2em;
            }

            .coming-soon-image img {
                max-width: 300px;
            }
        }

        @media (max-width: 480px) {
            .coming-soon-content h1 {
                font-size: 2em;
            }

            .coming-soon-content p {
                font-size: 1em;
            }
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .mobile-menu-toggle span {
            width: 25px;
            height: 3px;
            background: #212121;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><img src="trans logo 12.png" alt="PToB Logo"></a>
            </div>

            <ul class="nav-menu">
                <li><a href="english.html">HOME</a></li>
                <li class="dropdown">
                    <a href="#courses">1 TO 1 SESSION</a>
                    <div class="dropdown-content">
                        <a href="30min-session.html">30 min</a>
                        <a href="60min-session.html">60 min</a>
                    </div>
                </li>
                <li><a href="ask-gari.html">Quick Question?</a></li>
                <li><a href="about-gari.html">ABOUT GARI</a></li>
                <li><a href="about-ptob.html">ABOUT PToB</a></li>
                <li class="dropdown">
                    <a href="#courses">COURSES</a>
                    <div class="dropdown-content">
                        <a href="444.html">Four4Four</a>
                        <a href="yet-to-come.html">for teachers</a>
                        <a href="yet-to-come.html">for students</a>
                    </div>
                </li>
                <li><a href="blog.html">BLOG</a></li>
                <li><a href="contact-us.html">CONTACT</a></li>
                <li><a href="#more">MORE</a></li>
            </ul>

            <div class="nav-icons">
                <div class="cart-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2d3436" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-count">0</span>
                </div>
                <div class="search-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2d3436" stroke-width="2">

                    </svg>

            </div>

            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Coming Soon Section -->
    <section class="coming-soon">
        <div class="coming-soon-container">
            <div class="coming-soon-content">
                <h1>
                    <span class="yet">Yet</span>
                    To Come
                </h1>
                <p>
                    <span class="highlight">Video courses are yet to come</span><br>
                    We're working on something extraordinary for both teachers and students.
                </p>
                <form class="notify-form">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit">Notify Me</button>
                </form>
            </div>
            <div class="coming-soon-image">
                <img src="banana_naked.png" alt="Coming Soon" onerror="this.src='banana naked - Copy.jpeg'">
            </div>
        </div>
    </section>

    <script>
        // Mobile menu toggle
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const navMenu = document.querySelector('.nav-menu');

        if (mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });
        }

        // Form submission
        document.querySelector('.notify-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input').value;
            alert('Thank you! We will notify you at: ' + email);
            this.reset();
        });
    </script>
</body>
</html>
