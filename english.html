<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTOB - Past Tense of Banana - English Support Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            line-height: 1.6;
            color: #2d3436;
            background: #ffffff;
        }

        /* Navigation */
        nav {
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 80px;
            width: auto;
            background: #ffffff;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 35px;
            list-style: none;
        }

        .nav-menu a {
            color: #2d3436;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #FFD54F;
            transition: width 0.3s ease;
        }

        .nav-menu a:hover {
            color: #FFD54F;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .search-icon {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .search-icon:hover {
            transform: scale(1.1);
        }

        /* Hero Section */
        .hero {
            background: #ffffff;
            min-height: calc(100vh - 110px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
        }

        .hero-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            z-index: 1;
            position: relative;
        }

        .hero-image {
            position: relative;
            animation: fadeInLeft 1s ease;
            background: transparent;
        }

        .hero-image img {
            width: 100%;
            max-width: 700px;
            height: auto;
            background: transparent;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .hero-content {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInRight 1s ease;
            background: transparent;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .hero-logo-image {
            max-width: 500px;
            width: 100%;
            height: auto;
            background: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero-container {
                grid-template-columns: 1fr;
                gap: 60px;
                text-align: center;
            }

            .hero-image {
                order: 2;
                display: flex;
                justify-content: center;
            }

            .hero-image img {
                max-width: 500px;
            }

            .hero-content {
                order: 1;
            }

            .hero-logo-image {
                max-width: 400px;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .logo img {
                height: 60px;
            }

            .hero-image img {
                max-width: 400px;
            }

            .hero-logo-image {
                max-width: 300px;
            }
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .mobile-menu-toggle span {
            width: 25px;
            height: 3px;
            background: #212121;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <img src="logo ptob 4.png" alt="PTOB Logo">
            </div>

            <ul class="nav-menu">
                <li><a href="#level-test">LEVEL TEST</a></li>
                <li><a href="#blog">BLOG</a></li>
                <li><a href="#courses">OUR COURSES</a></li>
                <li><a href="#academy">ACADEMY</a></li>
                <li><a href="#intensive">INTENSIVE COURSES</a></li>
                <li><a href="#lesson">LESSON 1:1</a></li>
                <li><a href="#contact">CONTACT</a></li>
                <li><a href="#account">MY ACCOUNT</a></li>
            </ul>

            <div class="nav-icons">
                <div class="cart-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2d3436" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-count">0</span>
                </div>
                <div class="search-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2d3436" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </div>
            </div>

            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-container">
            <div class="hero-image">
                <img src="GARI BIG 1.jpg" alt="English Teacher" onerror="this.src='banana_naked.png'">
            </div>
            <div class="hero-content">
                <img src="logo new 1.png" alt="PTOB - Past Tense of Banana" class="hero-logo-image">
            </div>
        </div>
    </section>

    <script>
        // Mobile menu toggle
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const navMenu = document.querySelector('.nav-menu');

        if (mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });
        }

        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
